<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apollo-11 Mission Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body id="mainBodyFrame">
    <div class="stars"></div>
    <div class="twinkling"></div>
    <canvas id="particleCanvas"></canvas>

    <main class="relative z-10 w-full max-w-7xl mx-auto px-4 py-8">
        <h1 class="text-center text-4xl font-black text-cyan-400 mb-8">APOLLO-11 COMMAND</h1>
        
        <div class="glass-panel p-6 rounded-2xl border-t-4 border-cyan-500">
            <button id="toggleSettingsBtn" class="text-slate-400 mb-4"><i class="fa-solid fa-gears"></i> ตั้งค่า</button>
            <div id="quickSettingsPanel" class="hidden space-y-2 mb-4">
                <input type="text" id="webhookInput" class="w-full bg-slate-900 p-2 text-xs" placeholder="Webhook URL">
                <input type="text" id="roleInput" class="w-full bg-slate-900 p-2 text-xs" placeholder="Role ID">
            </div>
            
            <form id="cosmicForm" class="space-y-4">
                <textarea id="cosmicQuestion" required class="w-full bg-slate-950 p-4 text-sm" placeholder="พิมพ์ข้อความ..."></textarea>
                <button type="submit" id="launchBtn" class="w-full py-4 bg-purple-600 rounded-xl font-bold">ยิงสัญญาณวิทยุ 🛰️</button>
            </form>
        </div>
        
        <div class="glass-panel mt-6 p-6">
            <p id="previewQuestion" class="font-mono">> รอข้อมูล...</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
