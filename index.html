<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret Letter</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="stars"></div>

<div class="container">

    <div class="card">

        <div class="icon">📜</div>

        <h1>Secret Letter</h1>

        <div id="datetime" class="datetime">
            Loading...
        </div>

        <p class="subtitle">
            Write your message<br>
            to the unknown...
        </p>

        <input
            type="text"
            id="name"
            placeholder="Your Name (Optional)"
        >

        <input
            type="text"
            id="image"
            placeholder="Image URL (Optional)"
        >

        <textarea
            id="message"
            placeholder="Write your secret letter..."
        ></textarea>

        <button id="sendBtn">
            📬 Send Letter
        </button>

        <div id="status"></div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
