<div class="game-container">
    <div class="status-bar">
        <div class="player-stat">HP: <span id="p-hp">100</span> | Level: 1</div>
        <div class="enemy-stat">Enemy HP: <span id="e-hp">100</span></div>
    </div>

    <div class="battle-arena">
        <div id="enemy-sprite" class="enemy">🤡</div>
    </div>

    <div id="log" class="battle-log">เตรียมตัวบวก!</div>

    <div class="controls">
        <button onclick="attack()">โจมตีด้วยนิ้วชี้</button>
        <button onclick="skill()">ใช้สกิล "ด่าแม่"</button>
        <button onclick="heal()">กินมาม่า (Heal)</button>
    </div>
</div>
