<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Webhook — Medieval Space Gate</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Sarabun:wght@400;500;600&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #fff5f5 0%, #fff0f5 50%, #f0f4ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            font-family: 'Sarabun', sans-serif;
        }

        body::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,182,193,0.3) 0%, rgba(255,255,255,0) 70%);
            top: -200px;
            right: -100px;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 460px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 35px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(255, 77, 77, 0.05), 0 5px 15px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            transition: all 0.4s ease;
        }

        .card-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .card-header .icon {
            font-size: 32px;
            margin-bottom: 8px;
            display: inline-block;
        }

        h2 {
            font-family: 'UnifrakturMaguntia', serif;
            color: #1a202c;
            font-size: 36px;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #4a5568;
            font-size: 16px;
            font-weight: 500;
            padding-left: 4px;
            font-family: 'MedievalSharp', cursive;
            letter-spacing: 0.5px;
        }

        input, textarea {
            width: 100%;
            padding: 14px 16px;
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            color: #2d3748;
            transition: all 0.25s ease;
            outline: none;
            font-family: 'Sarabun', sans-serif;
        }

        input::placeholder, textarea::placeholder {
            color: #cbd5e0;
            font-family: 'MedievalSharp', cursive;
        }

        input:focus, textarea:focus {
            background: #ffffff;
            border-color: #ff7675;
            box-shadow: 0 0 0 4px rgba(255, 118, 117, 0.15);
        }

        textarea {
            resize: none;
            min-height: 110px;
            line-height: 1.6;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ff7675 0%, #ff5252 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 82, 82, 0.3);
            transition: all 0.25s ease;
            margin-top: 10px;
            font-family: 'MedievalSharp', cursive;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 82, 82, 0.4);
        }

        button:disabled {
            background: #cbd5e0;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* ซ่อนส่วนของฟอร์มส่งข้อความไว้ตอนแรก */
        #mainContent {
            display: none;
        }

        /* สไตล์สำหรับข้อความเตือนคีย์ผิด */
        .error-text {
            color: #d32f2f;
            font-size: 14px;
            margin-top: 8px;
            text-align: center;
            display: none;
            font-weight: 500;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #ebfbee;
            border: 1px solid #c3e6cb;
            padding: 12px 24px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateY(150px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast .toast-icon {
            color: #2b8a3e;
            font-size: 18px;
        }

        .toast .toast-text {
            color: #2b8a3e;
            font-size: 14px;
            font-weight: 500;
        }

        .toast.error {
            background: #fff5f5;
            border-color: #ffe3e3;
        }
        
        .toast.error .toast-icon, .toast.error .toast-text {
            color: #c92a2a;
        }
    </style>
</head>
<body>

<div class="container">
    
    <div class="card" id="keyGate">
        <div class="card-header">
            <span class="icon">🔒</span>
            <h2>Enter Secret Key</h2>
        </div>
        <form id="keyForm">
            <div class="form-group">
                <label for="secretKey">Thy Access Passcode</label>
                <input type="password" id="secretKey" required placeholder="Enter thy secret key...">
                <div id="keyError" class="error-text">❌ คีย์ไม่ถูกต้อง กรุณากรอกใหม่อีกครั้ง</div>
            </div>
            <button type="submit">Unlock Gate</button>
        </form>
    </div>

    <div class="card" id="mainContent">
        <div class="card-header">
            <span class="icon">📜</span>
            <h2>Send Message</h2>
        </div>
        
        <form id="webhookForm">
            <div class="form-group">
                <label for="name">Thy Name</label>
                <input type="text" id="name" required placeholder="Enter thy name...">
            </div>
            <div class="form-group">
                <label for="imageUrl">Image Link (Optional)</label>
                <input type="url" id="imageUrl" placeholder="https://example.com/image.png">
            </div>
            <div class="form-group">
                <label for="message">Thy Message</label>
                <textarea id="message" required placeholder="Write thy parchment here..."></textarea>
            </div>
            <button type="submit" id="submitBtn">Dispatch</button>
        </form>
    </div>

</div>

<div id="toastNotification" class="toast">
    <span class="toast-icon" id="toastIcon">✨</span>
    <span class="toast-text" id="toastText">ส่งข้อความเรียบร้อยแล้ว!</span>
</div>

<script>
    // 🔑 คีย์ความปลอดภัยที่คุณกำหนดไว้
    const CORRECT_KEY = 'KEY157373013';

    // ⚠️ วาง URL Webhook ของ Discord ของคุณตรงนี้ครับ
    const WEBHOOK_URL = 'https://discord.com/api/webhooks/1516806138388025535/5eWRG1I22cAz_PpPhTyQQwdOgWvjFUlZdhqdaWZ6IUpTf3lLgLi6gSDOMJ58gdsp4CbW';

    // ดึง Element ต่างๆ มารอทำงาน
    const keyGate = document.getElementById('keyGate');
    const mainContent = document.getElementById('mainContent');
    const keyForm = document.getElementById('keyForm');
    const keyError = document.getElementById('keyError');

    const form = document.getElementById('webhookForm');
    const submitBtn = document.getElementById('submitBtn');
    const toast = document.getElementById('toastNotification');
    const toastIcon = document.getElementById('toastIcon');
    const toastText = document.getElementById('toastText');

    // ระบบเช็คคีย์หน้าแรก
    keyForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const userInputKey = document.getElementById('secretKey').value.trim();

        if (userInputKey === CORRECT_KEY) {
            // คีย์ถูกต้อง -> ซ่อนด่านเช็คคีย์ แล้วเปิดหน้าฟอร์มหลักออกมาสวยๆ
            keyGate.style.display = 'none';
            mainContent.style.display = 'block';
        } else {
            // คีย์ผิด -> แสดงข้อความเตือนสีแดง และล้างช่องกรอกใหม่
            keyError.style.display = 'block';
            document.getElementById('secretKey').value = '';
            document.getElementById('secretKey').focus();
        }
    });

    // ระบบ Toast แจ้งเตือน
    function showToast(message, isSuccess = true) {
        toastText.innerText = message;
        if(isSuccess) {
            toast.classList.remove('error');
            toastIcon.innerText = '✨';
        } else {
            toast.classList.add('error');
            toastIcon.innerText = '❌';
        }
        
        toast.classList.add('show');
        
        setTimeout(() => {
            toast.classList.remove('show');
        }, 4000);
    }

    // ระบบส่งข้อความ Webhook (สไตล์อวกาศล้ำๆ พร้อมแนบรูปภาพ)
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const name = document.getElementById('name').value.trim();
        const imageUrl = document.getElementById('imageUrl').value.trim();
        const message = document.getElementById('message').value.trim();

        if (!name || !message) return;

        submitBtn.disabled = true;
        submitBtn.innerText = 'Dispatching...';

        const payload = {
            username: "Cosmic Messenger",
            avatar_url: "https://i.imgur.com/8QGZ78K.png", 
            content: "@here 🌌 *A new transmission has breached the cosmic rift!*", 
            embeds: [{
                title: "🌠 NEBULA TRANSMISSION DETAILS",
                color: 9116159, 
                fields: [
                    { name: "👨‍🚀 Explorer", value: `\`\`\`css\n[ ${name} ]\n\`\`\``, inline: true },
                    { name: "📡 Frequency Status", value: "🟢 Stable connection", inline: true },
                    { name: "💬 Deep Space Message", value: message, inline: false }
                ],
                timestamp: new Date().toISOString(),
                footer: { 
                    text: "Cosmic Webhook Core v2.0",
                    icon_url: "https://i.imgur.com/8QGZ78K.png"
                }
            }]
        };

        if (imageUrl) {
            payload.embeds[0].image = {
                url: imageUrl
            };
        }

        try {
            const response = await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                showToast('ส่งข้อความเรียบร้อยแล้ว!', true);
                form.reset();
            } else {
                throw new Error('Network response was not ok.');
            }
        } catch (error) {
            showToast('เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง', false);
            console.error('Error sending webhook:', error);
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = 'Dispatch';
        }
    });
</script>

</body>
</html>
