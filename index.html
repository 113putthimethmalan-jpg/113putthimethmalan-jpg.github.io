<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Apollo-11 Command Terminal</title>
    <style>
        body { background: #050508; color: #00ff41; font-family: 'Courier New', monospace; display: flex; justify-content: center; padding: 50px; }
        .terminal { border: 2px solid #333; padding: 20px; width: 500px; background: #0c0c14; box-shadow: 0 0 20px rgba(0, 255, 65, 0.2); }
        h1 { font-size: 1.2em; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .nebula-box { width: 100%; height: 200px; background: url('https://images.nasa.gov/details-PIA23624/PIA23624~orig.jpg') center/cover; border: 1px solid #ff00ff; margin: 15px 0; }
        input, textarea { width: 100%; box-sizing: border-box; background: #000; color: #00ff41; border: 1px solid #444; padding: 10px; margin-top: 10px; }
        button { background: #00ff41; color: #000; border: none; padding: 10px; margin-top: 10px; width: 100%; cursor: pointer; font-weight: bold; }
        button:hover { background: #008f11; }
    </style>
</head>
<body>

<div class="terminal">
    <h1>┌── ศูนย์ควบคุมยาน Apollo-11 ──┐</h1>
    <div class="nebula-box"></div>
    <form id="spaceForm">
        <input type="text" id="username" placeholder="ระบุตัวตนนักบิน (Call Sign)" required>
        <textarea id="message" rows="3" placeholder="ข้อความถึงดาวอังคาร..." required></textarea>
        <button type="submit">ส่งสัญญาณผ่านวิทยุ 📡</button>
    </form>
</div>

<script>
    document.getElementById('spaceForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // --- ตั้งค่าส่วนตัวของคุณตรงนี้ ---
        const webhookUrl = "https://discord.com/api/webhooks/1516806138388025535/5eWRG1I22cAz_PpPhTyQQwdOgWvjFUlZdhqdaWZ6IUpTf3lLgLi6gSDOMJ58gdsp4CbW"; 
        const adminId = "1513916622593593578"; // ใส่เลข ID ของแอดมินที่นี่
        // ------------------------------

        const payload = {
            username: "ศูนย์ควบคุมยาน Apollo-11 BOT",
            content: `<@${adminId}> มีสัญญาณวิทยุด่วนจากพิกัดนิรนามครับ!`, 
            embeds: [{
                title: "⚡ สัญญาณควันตัมเข้ารหัส: มีข้อความใหม่!",
                description: "ระบบตรวจพบการส่งสัญญาณวิทยุจากพิกัดนิรนามในระบบสุริยะ",
                color: 16711935,
                fields: [
                    { name: "🛸 ผู้ส่งสัญญาณ", value: document.getElementById('username').value, inline: true },
                    { name: "📡 สถานะ", value: "🟢 เสถียรดี (100%)", inline: true },
                    { name: "💬 เนื้อหาคำถาม", value: `> ${document.getElementById('message').value}` }
                ],
                image: { url: "https://images.nasa.gov/details-PIA23624/PIA23624~orig.jpg" },
                footer: { text: "Deep Space Network (DSN) • " + new Date().toLocaleTimeString() }
            }]
        };

        await fetch(webhookUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        alert("สัญญาณถูกยิงเข้าสู่ชั้นบรรยากาศและแจ้งเตือนแอดมินแล้ว!");
    });
</script>
</body>
</html>
