<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Apollo-11 Terminal</title>
</head>
<body>
    <canvas id="spaceCanvas"></canvas>
    <div class="terminal">
        <h1>APOLLO-11 COMMAND</h1>
        <div class="nebula-box"></div>
        <form id="spaceForm">
            <input type="text" id="username" placeholder="CALL SIGN..." required>
            <textarea id="message" rows="3" placeholder="TRANSMISSION..." required></textarea>
            <button type="submit" id="sendBtn">INITIATE TRANSMISSION 📡</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
