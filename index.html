<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Apollo-11 Terminal</title>
</head>
<body>
    <div class="terminal">
        <div class="image-box"></div>
        <h1>APOLLO-11 COMMAND</h1>
        
        <form id="spaceForm">
            <input type="text" id="username" placeholder="CALL SIGN" required>
            <textarea id="message" rows="2" placeholder="TRANSMISSION" required></textarea>
            <button type="submit" id="sendBtn">TRANSMIT SIGNAL</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
